<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/javascript/newpassword_forgotpassword.js">
    <style>
        body {
            background-color: lavender;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            text-align: center;
        }
        form {
            margin-top: 20px;
            text-align: center;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
<div>
    <h2>Forgot Password?</h2>
    <form action="New_Password.html" method="get" onsubmit="return validateForm(event)">
        <label for="email">Enter Email:</label><br />
        <input type="text" id="email" name="email" size="30"><br /><br />
        <button type="button" onclick="showVerificationCode()">Send verification code</button><br />
        <p id="demo" style="display:none">
            Verification code sent to email!<br /><br />
            <label for="code">Enter Code:</label><br />
            <input type="text" id="code" name="code" size="15"><br /><br />
            <input type="button" value="Resend Code"><br /><br />
            <button type="submit">Submit</button>
        </p>
        <div id="errorMessage" class="error"></div>
    </form>
</div>
<script>function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
}

function showVerificationCode() {
    const email = document.getElementById('email').value;
    const errorMessage = document.getElementById('errorMessage');
    
    if (!email) {
        errorMessage.textContent = 'Email is required.';
        return false;
    }
    
    if (!validateEmail(email)) {
        errorMessage.textContent = 'Invalid email format.';
        return false;
    }

    errorMessage.textContent = '';
    document.getElementById('demo').style.display = 'block';
}

function validateForm(event) {
    const code = document.getElementById('code').value;
    const errorMessage = document.getElementById('errorMessage');

    if (!code) {
        errorMessage.textContent = 'Verification code is required.';
        return false;
    }

    errorMessage.textContent = '';
    alert('Verification successful!');
    return true;
}</script>
</body>
</html>
