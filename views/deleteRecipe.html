<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Recipe</title>
    <link rel="stylesheet" href="/css/edit, delete.css">
</head>
<body>
    <div class="container">
        <h1>Delete Recipe</h1>
        <p>Are you sure you want to delete this recipe?</p>
        <form action="/deleteRecipe" method="POST">

            <button type="submit">Yes, Delete Recipe</button>
        </form>
    </div>
</body>
</html>
