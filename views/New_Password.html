<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <link rel="stylesheet" href="/javascript/newpassword_forgotpassword.js">
    <style>
        body {
            background-color: lavender;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            text-align: center;
        }
        form {
            margin-top: 20px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <form id="passwordForm" action="Reset_Password_Successfull.html" method="get" onsubmit="validateForm(event)">
        <label for="password">New Password:</label><br />
        <input type="password" id="password" name="password" size="22"><br />
        <br />
        <label for="confirmPassword">Confirm Password:</label><br />
        <input type="password" id="confirmPassword" name="confirmPassword" size="22"><br />
        <br />
        <div id="errorMessage" class="error"></div>
        <br />
        <button type="submit">Confirm</button>
    </form>
<script>
    function validateForm(event) {
    event.preventDefault();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorMessage = document.getElementById('errorMessage');

    // Regular expression for password validation
    const passwordRegex = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}$/;

    if (!passwordRegex.test(password)) {
        errorMessage.textContent = 'Please set a new password. Password must be at least 8 characters long and include at least one number, one uppercase letter, one lowercase letter and one special character.';
        return false;
    }

    if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match.';
        return false;
    }

    errorMessage.textContent = '';
    alert('Password successfully updated!');
    document.getElementById('passwordForm').submit();
}
</script>
</body>
</html>
